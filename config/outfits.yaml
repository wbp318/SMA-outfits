# ===========================================================================
# SMA "OUTFITS" — moving-average period sets transcribed from the source repo
# (see docs/SOURCE_ANALYSIS.md).
#
# READ THIS FIRST:
# The source attributes mystical / numerological meaning to these numbers
# (presidential-seat numbers, a 9/11 "homage", Waring's-problem integers, etc.)
# and claims intelligence agencies use them to secretly control markets. We
# make NO such assumption. A moving average of period 911 has no special power.
#
# These sets live here for ONE reason: so the backtester can EMPIRICALLY test
# whether any of them shows a real, repeatable edge versus buy-and-hold and
# versus random period sets. Treat every "edge" claim as a hypothesis to be
# falsified, not a fact. `numerology: true` flags sets whose only stated
# justification is symbolic.
# ===========================================================================

