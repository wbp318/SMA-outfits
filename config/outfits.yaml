# ---------------------------------------------------------------------------
# The three "systems" with their stated trend rules. The source defines a
# binary regime (positive/negative) from a fast-vs-slow MA relationship, plus a
# "key level" long MA, plus a high-volatility variant using a candle close
# relative to the middle MA. We encode them so they can be backtested as-stated.
# Instruments here are equity indices (Webull-later); for Kraken we apply the
# same rule shapes to crypto symbols.
# ---------------------------------------------------------------------------
systems:
  - id: spx_system
    instrument: SPX
    outfit_id: sp500
    timeframes: ["30m"]
    trend_fast: 10
    trend_slow: 50           # positive when MA10 > MA50, negative when MA10 < MA50
    key_level: 200           # MA200 is the major recovery/breakdown level
    high_vol_level: 50       # under high vol, use candle close vs MA50
  - id: ixic_system
    instrument: IXIC
    outfit_id: nasdaq
    timeframes: ["20m", "30m"]
    trend_fast: 20
    trend_slow: 100
    key_level: 250
    high_vol_level: 100
  - id: dji_system
    instrument: DJI
    outfit_id: dji
    timeframes: ["15m", "1h"]
    trend_fast: 90
    trend_slow: 300
    key_level: 900
    high_vol_level: 300
